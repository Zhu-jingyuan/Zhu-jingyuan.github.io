    var input = document.getElementById('pwd-input');

          setLoading(false);
          return;
        }

        contentDiv.innerHTML = result.slice(verifyPrefix.length);
        contentDiv.style.display = 'block';
        lockDiv.style.display = 'none';

.15-.375.038-.737t.562-.538q.1-.05.188-.1t.187-.1L12 14.8v2.775q0 .675-.612.938T10.3 18.3L7 15H4q-.425 0-.712-.288T3 14v-4q0-.425.288-.712T4 9h2.2L2.1 4.9q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l17 17q.275.275.275.7t-.275.7t-.7.275t-.7-.275zm2.225-7.6q0-2.075-1.1-3.787t-2.95-2.563q-.375-.175-.55-.537t-.05-.738q.15-.4.538-.575t.787 0Q18.1 4.85 19.55 7.05T21 11.975q0 .825-.15 1.638t-.425 1.562q-.2.55-.612.688t-.763.012t-.562-.45t-.013-.75q.275-.65.4-1.312T19 11.975m-4.225-3.55Q15.6 8.95 16.05 10t.45 2v.25q0 .125-.025.25q-.05.325-.35.425t-.55-.15L14.3 11.5q-.15-.15-.225-.337T14 10.775V8.85q0-.3.263-.437t.512.012M9.75 6.95Q9.6 6.8 9.6 6.6t.15-.35l.55-.55q.475-.475 1.087-.213t.613.938V8q0 .35-.3.475t-.55-.125z"/></symbol><use href="#ai:material-symbols:volume-off-rounded"></use>  </svg> <svg width="1em" height="1em" data-icon="material-symbols:graphic-eq-rounded">   <symbol id="ai:material-symbols:graphic-eq-rounded" viewBox="0 0 24 24"><path fill="currentColor" d="M7 17V7q0-.425.288-.712T8 6t.713.288T9 7v10q0 .425-.288.713T8 18t-.712-.288T7 17m4 4V3q0-.425.288-.712T12 2t.713.288T13 3v18q0 .425-.288.713T12 22t-.712-.288T11 21m-8-8v-2q0-.425.288-.712T4 10t.713.288T5 11v2q0 .425-.288.713T4 14t-.712-.288T3 13m12 4V7q0-.425.288-.712T16 6t.713.288T17 7v10q0 .425-.288.713T16 18t-.712-.288T15 17m4-4v-2q0-.425.288-.712T20 10t.713.288T21 11v2q0 .425-.288.713T20 14t-.712-.288T19 13"/></symbol><use href="#ai:material-symbols:graphic-eq-rounded"></use>  </svg> </span> </div> </div> <!-- 工具栏 --> <div class="sidebar-card toolbar-card dock-container dock-bg" id="tb-card"> <div id="tb-container" class="tb-container"> <div id="tb-btns" class="tb-btns dock-container"> <button id="tb-search-btn" class="toolbar-btn dock-style" type="button" title="搜索"> <svg width="1em" height="1em" class="tb-icon" data-icon="lucide:search">   <symbol id="ai:lucide:search" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="m21 21l-4.34-4.34"/><circle cx="11" cy="11" r="8"/></g></symbol><use href="#ai:lucide:search"></use>  </svg> </button> <a href="/archives" class="toolbar-btn dock-style" title="归档"> <svg width="1em" height="1em" class="tb-icon" data-icon="lucide:archive">   <symbol id="ai:lucide:archive" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8m-10 4h4"/></g></symbol><use href="#ai:lucide:archive"></use>  </svg> </a> <button id="theme-circle-btn" class="toolbar-btn dock-style" title="切换主题"> <svg width="1em" height="1em" class="tb-icon" id="circle-theme-icon" data-icon="lucide:moon">   <symbol id="ai:lucide:moon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></symbol><use href="#ai:lucide:moon"></use>  </svg> </button> </div> <form id="tb-search-form" class="tb-search-form" action="/search" method="get"> <span class="tb-search-icon"><svg width="1em" height="1em" viewBox="0 0 24 24" class="tb-icon" data-icon="lucide:search">   <use href="#ai:lucide:search"></use>  </svg></span> <input type="text" name="q" id="tb-search-input" class="tb-search-input" placeholder="搜索文章..." autocomplete="off"> <button type="submit" class="tb-search-submit"><svg width="1em" height="1em" class="tb-sm-icon" data-icon="lucide:arrow-right">   <symbol id="ai:lucide:arrow-right" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7l7 7l-7 7"/></symbol><use href="#ai:lucide:arrow-right"></use>  </svg></button> </form> </div> </div> </div> <script>
(function(){
  // 运行天数 & 最后更新
  var d = document.getElementById('running-days');
  if(d) d.textContent = String(Math.ceil(Math.abs(Date.now()-new Date('2023-08-01').getTime())/86400000));
  var u = document.getElementById('last-update');
  if(u) u.textContent = Math.floor(Math.abs(Date.now()-new Date('2026-04-21').getTime())/86400000)+' 天前';

  // 主题切换
  var tb = document.getElementById('theme-circle-btn'), ti = document.getElementById('circle-theme-icon');
  if(tb&&ti){
    function ic(){ti.setAttribute('name',document.documentElement.getAttribute('data-theme')==='dracula'?'lucide:sun':'lucide:moon');}
    tb.addEventListener('click',function(){var c=document.documentElement.getAttribute('data-theme'),n=c==='dracula'?'winter':'dracula';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);tb.classList.add('spin-once');setTimeout(function(){tb.classList.remove('spin-once')},300);ic();});ic();
  }

  // 搜索表单
  var sb = document.getElementById('tb-search-btn');
  var form = document.getElementById('tb-search-form');
  var inp = document.getElementById('tb-search-input');
  var btns = document.getElementById('tb-btns');

  document.addEventListener('astro:page-load', function(){
    if(!form||!btns) return;
    if(form.style.display === 'flex'){
      form.style.display = 'none';
      form.style.width = '';
      form.style.opacity = '';
      form.style.borderWidth = '';
      form.style.transition = '';
      btns.style.opacity = '1';
    }
  });

  if(sb&&form&&inp&&btns){
    var raf = null;

    sb.addEventListener('click',function(e){
      e.stopPropagation();
      e.preventDefault();
      btns.style.opacity = '0';
      form.style.display = 'flex';
      var w = btns.offsetWidth;
      form.style.width = '0px';
      form.style.borderWidth = '0';
      form.style.opacity = '0';
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(function(){
        form.style.transition = 'width 0.35s ease, opacity 0.2s ease, border-width 0.3s ease';
        form.style.width = w + 'px';
        form.style.opacity = '1';
        form.style.borderWidth = '1px';
      });
      setTimeout(function(){inp.focus();}, 370);
    });

    form.addEventListener('click',function(e){e.stopPropagation();});

    document.addEventListener('click',function(e){
      if(form.style.display !== 'flex') return;
      if(inp.value.trim()===''){
        form.style.transition = 'width 0.35s ease, opacity 0.2s ease, border-width 0.3s ease';
        form.style.width = '0px';
        form.style.opacity = '0';
        form.style.borderWidth = '0';
        btns.style.opacity = '1';
        setTimeout(function(){form.style.display = 'none';}, 360);
      }
    });
  }

  // ===== 粘性定位 =====
  (function(){
    var sticky = document.querySelector('.sticky-section');
    var sidebar = sticky ? sticky.parentElement : null;
    if(!sticky || !sidebar) return;

    var ticking = false;

    function updateSticky(){
      var sidebarRect = sidebar.getBoundingClientRect();
      var statsCard = sidebar.querySelector('.stats-card');
      var statsRect = statsCard ? statsCard.getBoundingClientRect() : null;
      var shouldFix = statsRect && statsRect.bottom <= 24;

      if(shouldFix){
        sticky.classList.add('sticky-section--fixed');
        sticky.style.width = sidebarRect.width + 'px';
        sticky.style.left = sidebarRect.left + 'px';
      } else {
        sticky.classList.remove('sticky-section--fixed');
        sticky.style.width = '';
        sticky.style.left = '';
      }
      ticking = false;
    }

    function onScroll(){
      if(!ticking){ requestAnimationFrame(updateSticky); ticking = true; }
    }

    window.addEventListener('scroll', onScroll, {passive: true});
    window.addEventListener('resize', function(){
      if(sticky.classList.contains('sticky-section--fixed')){
        var sr = sidebar.getBoundingClientRect();
        sticky.style.width = sr.width + 'px';
        sticky.style.left = sr.left + 'px';
      }
    });
    // astro 页面切换后重新计算
    document.addEventListener('astro:page-load', function(){
      if(sticky.classList.contains('sticky-section--fixed')){
        sticky.classList.remove('sticky-section--fixed');
        sticky.style.width = '';
        sticky.style.left = '';
      }
    });
  })();

  // ===== 音乐播放器 =====
  (function(){
    var audio = document.getElementById('music-player') ? new Audio() : null;
    if (!audio) return;

    var playlist = [];
    var currentIndex = 0;
    var _fetching = false;
    var _mode = 0;       // 0=顺序 1=单曲循环 2=随机
    var _showPlaylist = false;

    var coverEl = document.getElementById('music-cover');
    var titleEl = document.getElementById('music-title');
    var artistEl = document.getElementById('music-artist');
    var currentTimeEl = document.getElementById('music-current-time');
    var durationEl = document.getElementById('music-duration');
    var progressBar = document.getElementById('music-progress-bar');
    var progressFill = document.getElementById('music-progress-fill');
    var progressThumb = document.getElementById('music-progress-thumb');
    var playBtn = document.getElementById('music-play');
    var playIcon = document.getElementById('music-play-icon');
    var pauseIcon = document.getElementById('music-pause-icon');
    var prevBtn = document.getElementById('music-prev');
    var nextBtn = document.getElementById('music-next');
    var coverOverlay = document.getElementById('music-cover-overlay');
    var modeBtn = document.getElementById('music-mode-btn');
    var modeIcon = document.getElementById('music-mode-icon');
    var listBtn = document.getElementById('music-list-btn');
    var playlistEl = document.getElementById('music-playlist');
    var playlistInner = document.getElementById('music-playlist-inner');
    var muteBtn = document.getElementById('music-mute-btn');
    var volumeIcon = document.getElementById('music-volume-icon');
    var volumeSlider = document.getElementById('music-volume-slider');
    var volumeFill = document.getElementById('music-volume-fill');

    function fmt(t){var m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;}

    function updateProgress(){
      if(!audio.duration) return;
      var pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      progressThumb.style.left = pct + '%';
      currentTimeEl.textContent = fmt(audio.currentTime);
    }

    function updatePlayPause(state){
      if(state==='play'){
        playIcon.style.display = 'none';
        pauseIcon.style.display = '';
        playBtn.setAttribute('title', '暂停');
        coverOverlay.classList.add('hidden');
      } else {
        playIcon.style.display = '';
        pauseIcon.style.display = 'none';
        playBtn.setAttribute('title', '播放');
        coverOverlay.classList.remove('hidden');
      }
    }

    function updateVolumeUI(){
      var v = audio.volume;
      volumeFill.style.width = (v * 100) + '%';
      var iconName = v === 0 ? 'material-symbols:volume-off-rounded' : 'material-symbols:volume-up-rounded';
      volumeIcon.setAttribute('name', iconName);
      volumeIcon.setAttribute('data-icon', iconName);
      var use = volumeIcon.querySelector('use');
      if(use) use.setAttribute('href', '#ai:' + iconName);
    }

    function setVolume(v){
      v = Math.max(0, Math.min(1, v));
      audio.volume = v;
      localStorage.setItem('_music_vol', v);
      updateVolumeUI();
    }

    function updateModeIcon(){
      var icons = ['material-symbols:repeat-rounded','material-symbols:repeat-one-rounded','material-symbols:shuffle-rounded'];
      var name = icons[_mode] || icons[0];
      modeIcon.setAttribute('name', name);
      modeIcon.setAttribute('data-icon', name);
      var use = modeIcon.querySelector('use');
      if(use) use.setAttribute('href', '#ai:' + name);
    }

    function renderPlaylist(){
      if(!playlistInner) return;
      var html = '';
      for(var i = 0; i < playlist.length; i++){
        var s = playlist[i];
        var isCur = i === currentIndex;
        var eq = isCur && !audio.paused ? '<span class="music-pl-eq"><svg width="1em" height="1em"><use href="#ai:material-symbols:graphic-eq-rounded"></use></svg></span>' : '';
        html += '<div class="music-pl-item'+(isCur?' current':'')+'" data-index="'+i+'">'+
          '<div class="music-pl-cover"><img src="'+(s.cover||'')+'" alt="" /></div>'+
          '<div class="music-pl-info"><div class="music-pl-title">'+(s.title||'')+'</div><div class="music-pl-artist">'+(s.artist||'')+'</div></div>'+
          eq+'</div>';
      }
      playlistInner.innerHTML = html;
      // 点击歌单项切歌
      var items = playlistInner.querySelectorAll('.music-pl-item');
      for(var j = 0; j < items.length; j++){
        items[j].addEventListener('click', function(){
          var idx = parseInt(this.getAttribute('data-index'));
          if(!isNaN(idx)){ loadSong(idx, true); renderPlaylist(); }
        });
      }
    }

    function togglePlaylist(){
      _showPlaylist = !_showPlaylist;
      if(_showPlaylist){
        playlistEl.style.display = '';
        renderPlaylist();
      } else {
        playlistEl.style.display = 'none';
      }
    }

    function loadSong(index, autoPlay){
      if(index < 0 || index >= playlist.length) return;
      currentIndex = index;
      var song = playlist[index];
      titleEl.textContent = song.title || '未知歌曲';
      artistEl.textContent = song.artist || '未知艺术家';
      coverEl.src = song.cover || '';
      durationEl.textContent = song.duration ? fmt(song.duration) : '--:--';
      progressFill.style.width = '0';
      progressThumb.style.left = '0';
      currentTimeEl.textContent = '0:00';
      audio.src = song.url;
      audio.load();
      if(_showPlaylist) renderPlaylist();
      if(autoPlay){
        var onReady = function(){
          audio.removeEventListener('canplay', onReady);
          audio.play().catch(function(){});
        };
        audio.addEventListener('canplay', onReady);
      }
    }

    function nextSong(){
      if(!playlist.length) return;
      var idx;
      if(_mode === 2){
        // 随机
        do { idx = Math.floor(Math.random() * playlist.length); }
        while(idx === currentIndex && playlist.length > 1);
      } else {
        idx = currentIndex < playlist.length-1 ? currentIndex+1 : 0;
      }
      loadSong(idx, true);
    }

    function prevSong(){
      if(!playlist.length) return;
      var idx = currentIndex > 0 ? currentIndex-1 : playlist.length-1;
      loadSong(idx, true);
    }

    function togglePlay(){
      if(!playlist.length){
        if(!_fetching) fetchPlaylist();
        return;
      }
      if(audio.paused){
        if(!audio.src) loadSong(currentIndex, true);
        else audio.play().catch(function(){});
      } else {
        audio.pause();
      }
    }

    function cycleMode(){
      _mode = (_mode + 1) % 3;
      updateModeIcon();
    }

    // Audio events
    audio.addEventListener('play', function(){ updatePlayPause('play'); if(_showPlaylist) renderPlaylist(); });
    audio.addEventListener('pause', function(){ updatePlayPause('pause'); if(_showPlaylist) renderPlaylist(); });
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', function(){
      durationEl.textContent = fmt(audio.duration);
      updateProgress();
    });
    audio.addEventListener('ended', function(){
      if(_mode === 1){
        // 单曲循环
        audio.currentTime = 0;
        audio.play().catch(function(){});
      } else if(playlist.length <= 1){
        updatePlayPause('pause');
      } else {
        nextSong();
      }
    });
    audio.addEventListener('error', function(){
      if(playlist.length > 1 && currentIndex < playlist.length-1){
        setTimeout(function(){ loadSong(currentIndex+1, true); }, 2000);
      }
    });

    // Button handlers
    if(playBtn) playBtn.addEventListener('click', togglePlay);
    if(coverOverlay) coverOverlay.addEventListener('click', togglePlay);
    if(prevBtn) prevBtn.addEventListener('click', prevSong);
    if(nextBtn) nextBtn.addEventListener('click', nextSong);
    if(modeBtn) modeBtn.addEventListener('click', cycleMode);
    if(listBtn) listBtn.addEventListener('click', togglePlaylist);
    if(progressBar) progressBar.addEventListener('click', function(e){
      if(!audio.duration) return;
      var rect = progressBar.getBoundingClientRect();
      var pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
      updateProgress();
    });

    // Volume: mute toggle
    if(muteBtn) muteBtn.addEventListener('click', function(){
      setVolume(audio.volume === 0 ? (parseFloat(localStorage.getItem('_music_vol')) || 0.7) : 0);
    });

    // Volume: slider drag
    if(volumeSlider){
      function volFromEvent(e){
        var rect = volumeSlider.getBoundingClientRect();
        return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      }
      volumeSlider.addEventListener('pointerdown', function(e){
        setVolume(volFromEvent(e));
        volumeSlider.setPointerCapture(e.pointerId);
        function onMove(ev){ setVolume(volFromEvent(ev)); }
        function onUp(){ volumeSlider.releasePointerCapture(e.pointerId); document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
      volumeSlider.addEventListener('keydown', function(e){
        if(e.key==='ArrowLeft'||e.key==='ArrowDown'){ e.preventDefault(); setVolume(audio.volume - 0.05); }
        else if(e.key==='ArrowRight'||e.key==='ArrowUp'){ e.preventDefault(); setVolume(audio.volume + 0.05); }
      });
    }

    // Init volume from storage
    var savedVol = parseFloat(localStorage.getItem('_music_vol'));
    if(!isNaN(savedVol)) audio.volume = Math.max(0, Math.min(1, savedVol));
    else audio.volume = 0.7;
    updateVolumeUI();

    async function fetchPlaylist(){
      if(_fetching) return;
      _fetching = true;
      titleEl.textContent = '加载中...';
      artistEl.textContent = '正在获取播放列表';
      try {
        var api = 'https://api.injahow.cn/meting/?server=netease&type=playlist&id=14164869977&r=' + Date.now();
        var res = await fetch(api);
        if(!res.ok) throw new Error('API error');
        var list = await res.json();
        if(!list.length) throw new Error('Empty playlist');
        playlist = list.map(function(s){
          var dur = parseInt(s.duration) || 0;
          if(dur>10000) dur = Math.floor(dur/1000);
          return { title: s.name || s.title || '未知歌曲', artist: s.artist || s.author || '未知艺术家', cover: s.pic || '', url: s.url || '', duration: dur };
        });
        loadSong(0, false);
        updatePlayPause('pause');
      } catch(e){
        titleEl.textContent = '加载失败';
        artistEl.textContent = '请检查网络后刷新重试';
      } finally { _fetching = false; }
    }

    fetchPlaylist();
  })();
})();
