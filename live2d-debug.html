<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Live2D 调试 v2</title>
<style>
body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; display: flex; gap: 20px; }
#log { background: #0d0d0d; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 12px; line-height: 1.6; width: 480px; max-height: 600px; overflow-y: auto; }
.ok { color: #4caf50; }
.warn { color: #ff9800; }
.err { color: #f44336; }
.info { color: #64b5f6; }
h2 { color: #a18cd1; margin-top: 0; }
#canvas-area { flex-shrink: 0; }
button { margin: 4px 2px; padding: 6px 12px; background: #333; color: #eee; border: 1px solid #666; border-radius: 4px; cursor: pointer; }
button:hover { background: #555; }
#param-monitor { font-size: 11px; background: #0a0a1a; padding: 8px; border-radius: 4px; margin-top: 8px; white-space: pre; border: 1px solid #333; }
</style>
</head>
<body>
<div id="canvas-area">
  <h2>Live2D 调试 v2</h2>
  <div id="param-monitor">等待模型加载...</div>
  <br>
  <button onclick="playMotion(0)">播放 motion01 (Idle)</button>
  <button onclick="playMotion(5)">播放 motion06</button>
  <button onclick="playMotion(10)">播放 motion11</button>
  <br>
  <button onclick="toggleLock()">切换瞳孔锁定</button>
  <button onclick="toggleEyeLock()">切换 EyeLOpen 锁定</button>
  <br>
  <div id="canvas-container"></div>
</div>
<div>
  <h2>日志</h2>
  <div id="log">加载中...</div>
</div>

<script src="/js/lib/live2dcubismcore.min.js"></script>
<script src="/js/lib/live2d-bundle.js"></script>
<script>
const logEl = document.getElementById('log');
const monEl = document.getElementById('param-monitor');
const lines = [];
function log(cls, ...args) {
    const text = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
    lines.push('<span class="' + cls + '">' + text.replace(/</g,'&lt;') + '</span>');
    if (lines.length > 200) lines.shift();
    logEl.innerHTML = lines.join('\n');
    logEl.scrollTop = logEl.scrollHeight;
}

let model = null, app = null, core = null, pv = null, indices = null;
let pupilLocked = true;
let eyeLocked = false;
let frameCount = 0;

async function run() {
    log('info', '=== Live2D 调试 v2 ===');

    if (!window.PIXI || !window.PIXI.live2d) {
        log('err', '❌ PIXI.live2d 未定义'); return;
    }
    log('ok', '✅ PIXI 已加载');

    app = new PIXI.Application({ width: 300, height: 450, backgroundAlpha: 0, antialias: true });
    document.getElementById('canvas-container').appendChild(app.view);

    try {
        model = await PIXI.live2d.Live2DModel.from('/live2d/Murasame.model3.json', { autoInteract: false });
        log('ok', '✅ 模型加载成功');
    } catch(e) {
        log('err', '❌ 加载失败: ' + e.message); return;
    }

    app.stage.addChild(model);
    const sc = Math.min(300 / model.width, 450 / model.height);
    model.scale.set(sc);
    model.anchor.set(0.5, 0);
    model.x = 150; model.y = 0;

    core = model.internalModel.coreModel;
    pv = core._parameterValues;

    // 获取所有参数名
    const allParams = [];
    for (let i = 0; i < pv.length; i++) {
        allParams.push(i);
    }

    // 建立索引
    const paramNames = [
        'ParamAngleX','ParamAngleY','ParamAngleZ',
        'ParamEyeLOpen','ParamEyeROpen',
        'ParamEyeBallX','ParamEyeBallY',
        'ParamYanZhuSuoFangL','ParamYanZhuSuoFangR',
        'ParamGaoGguangL','ParamGaoGuangR',
        'ParamBodyAngleX'
    ];
    indices = {};
    paramNames.forEach(n => {
        const idx = core.getParameterIndex(n);
        indices[n] = idx;
        log(idx >= 0 ? 'ok' : 'warn', n + ' → ' + idx);
    });

    log('info', 'eyeBlink: ' + typeof model.internalModel.eyeBlink);

    // Hook loadParameters
    const origLoad = core.loadParameters.bind(core);
    core.loadParameters = function() {
        origLoad();
        frameCount++;
        applyLocks();
    };

    // Hook beforeModelUpdate
    model.internalModel.on('beforeModelUpdate', () => {
        applyLocks();
    });

    log('ok', '✅ hooks 已安装，开始监控...');

    // 每帧更新监控面板
    app.ticker.add(() => {
        if (!pv || !indices) return;
        const I = indices;
        const get = (name) => {
            const idx = I[name];
            return idx >= 0 ? pv[idx].toFixed(3) : '---';
        };
        monEl.textContent = [
            '--- 参数实时监控 ---',
            '锁瞳孔: ' + (pupilLocked ? '✅开' : '❌关') + '   锁眼开: ' + (eyeLocked ? '✅开' : '❌关'),
            '帧数: ' + frameCount,
            '',
            'ParamEyeLOpen     = ' + get('ParamEyeLOpen'),
            'ParamEyeROpen     = ' + get('ParamEyeROpen'),
            'ParamYanZhuSuoFangL = ' + get('ParamYanZhuSuoFangL'),
            'ParamYanZhuSuoFangR = ' + get('ParamYanZhuSuoFangR'),
            'ParamGaoGguangL   = ' + get('ParamGaoGguangL'),
            'ParamGaoGuangR    = ' + get('ParamGaoGuangR'),
            'ParamEyeBallX     = ' + get('ParamEyeBallX'),
            'ParamAngleX       = ' + get('ParamAngleX'),
        ].join('\n');
    });
}

function applyLocks() {
    if (!pv || !indices) return;
    const safe = (n, v) => {
        const i = indices[n];
        if (i >= 0 && i < pv.length) pv[i] = v;
    };
    if (pupilLocked) {
        safe('ParamYanZhuSuoFangL', 0);
        safe('ParamYanZhuSuoFangR', 0);
        safe('ParamGaoGguangL', 0);
        safe('ParamGaoGuangR', 0);
    }
    if (eyeLocked) {
        safe('ParamEyeLOpen', 1);
        safe('ParamEyeROpen', 1);
    }
}

function playMotion(idx) {
    if (!model) return;
    const im = model.internalModel;
    const motions = im.settings?.motions;
    if (!motions) { log('err', '无 motions'); return; }
    const group = Object.keys(motions)[0];
    const list = motions[group];
    if (!list || idx >= list.length) { log('warn', '超出范围'); return; }
    log('info', '播放: ' + group + '[' + idx + ']');
    model.motion(group, idx);
}

function toggleLock() {
    pupilLocked = !pupilLocked;
    log('info', '瞳孔锁定: ' + pupilLocked);
}

function toggleEyeLock() {
    eyeLocked = !eyeLocked;
    log('info', 'EyeLOpen 锁定: ' + eyeLocked);
}

run().catch(e => log('err', '错误: ' + e.message));
</script>
</body>
</html>
